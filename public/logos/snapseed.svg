<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="ss-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ss-lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#81C784;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#388E3C;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" ry="100" fill="url(#ss-bg)"/>
  <!-- Camera body -->
  <rect x="96" y="160" width="320" height="220" rx="28" fill="rgba(255,255,255,0.15)"/>
  <!-- Viewfinder bump -->
  <rect x="200" y="128" width="112" height="40" rx="12" fill="rgba(255,255,255,0.15)"/>
  <!-- Lens outer ring -->
  <circle cx="256" cy="272" r="88" fill="rgba(0,0,0,0.25)"/>
  <!-- Lens -->
  <circle cx="256" cy="272" r="68" fill="url(#ss-lens)"/>
  <!-- Lens inner -->
  <circle cx="256" cy="272" r="44" fill="rgba(0,0,0,0.4)"/>
  <!-- Lens highlight -->
  <circle cx="238" cy="254" r="14" fill="rgba(255,255,255,0.35)"/>
  <!-- Flash -->
  <rect x="296" y="150" width="36" height="20" rx="10" fill="rgba(255,255,255,0.5)"/>
</svg>
