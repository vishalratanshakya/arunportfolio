<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="cc-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" ry="100" fill="url(#cc-bg)"/>
  <!-- CapCut scissors/cut icon - stylized C with cut line -->
  <!-- Left arc -->
  <path d="M 320 256 A 100 100 0 1 1 320.001 256" fill="none" stroke="white" stroke-width="52" stroke-linecap="round"/>
  <!-- Cut line through right side -->
  <line x1="288" y1="192" x2="420" y2="138" stroke="#FE2C55" stroke-width="28" stroke-linecap="round"/>
  <line x1="288" y1="320" x2="420" y2="374" stroke="#FE2C55" stroke-width="28" stroke-linecap="round"/>
  <!-- Dot at cut point -->
  <circle cx="295" cy="256" r="18" fill="white"/>
</svg>
